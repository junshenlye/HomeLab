services:
  quant-research:
    build:
      context: .
      dockerfile: Dockerfile
    image: homelab-quant-research:latest
    env_file:
      - .env.quant.example
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./config:/app/config:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["--help"]
